name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ims
          POSTGRES_PASSWORD: ims_secret
          POSTGRES_DB: enterprise_ims_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ims"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ims:ims_secret@localhost:5432/enterprise_ims_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-min-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-min-32-characters-long
      ENCRYPTION_KEY: ci-encryption-key-32-bytes-long!!
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install
      - run: npm run db:generate
      - run: npm run lint -w backend
      - run: npm run test -w backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install
      - run: npm run lint -w frontend
      - run: npm run build -w frontend

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build api web
