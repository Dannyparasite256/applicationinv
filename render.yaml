databases:
  - name: eims-postgres
    plan: free
    databaseName: enterprise_ims
    user: ims

services:
  - type: web
    name: eims-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build -w backend
    startCommand: npm run db:migrate:deploy -w backend && npm run start -w backend
    healthCheckPath: /api/v1/docs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: API_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: eims-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: APP_NAME
        value: Enterprise IMS
      - key: EMAIL_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        value: https://eims-web.onrender.com
      - key: APP_URL
        value: https://eims-web.onrender.com
      - key: API_URL
        value: https://eims-api.onrender.com
      - key: DEFAULT_TENANT_SLUG
        value: demo

  - type: web
    name: eims-web
    runtime: static
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w frontend
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://eims-api.onrender.com/api/v1
