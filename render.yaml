# Enterprise IMS — Render free-tier Blueprint
# Repo: https://github.com/Dannyparasite256/applicationinv
# Docs: https://render.com/docs/blueprint-spec
#
# Creates:
#   1) eims-postgres  (free Postgres — expires after ~30 days on free)
#   2) eims-api       (free Node web service)
#   3) eims-web       (static site — always free; do NOT set plan/region)
#
# IMPORTANT after first successful deploy (manual in Render dashboard):
#   1. Open eims-api → copy its URL (e.g. https://eims-api-xxxx.onrender.com)
#   2. Open eims-web → Environment → set:
#        VITE_API_URL = https://YOUR-API-URL/api/v1
#      then Manual Deploy → Clear build cache & deploy
#   3. Open eims-api → Environment → set:
#        CORS_ORIGINS = https://YOUR-WEB-URL
#        APP_URL      = https://YOUR-WEB-URL
#        API_URL      = https://YOUR-API-URL
#      then Manual Deploy (or wait for auto redeploy)
#   4. Optional: eims-api → Shell → npm run db:seed -w backend

databases:
  - name: eims-postgres
    plan: free
    region: oregon
    databaseName: enterprise_ims
    user: ims
    postgresMajorVersion: "16"

services:
  # ---------------- Backend API (Node) ----------------
  - type: web
    name: eims-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run db:generate -w backend && npm run build -w backend
    startCommand: npm run db:migrate:deploy -w backend && npm run start -w backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: eims-postgres
          property: connectionString
      - key: REDIS_URL
        value: redis://127.0.0.1:6379
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: APP_NAME
        value: Enterprise IMS
      - key: EMAIL_ENABLED
        value: "false"
      - key: SMS_ENABLED
        value: "false"
      - key: OAUTH_GOOGLE_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: APP_URL
        value: https://eims-web.onrender.com
      - key: API_URL
        value: https://eims-api.onrender.com
      - key: DEFAULT_TENANT_SLUG
        value: demo
      - key: RATE_LIMIT_MAX
        value: "200"

  # ---------------- Frontend (static Vite build) ----------------
  # NOTE: static sites must NOT include plan/region (schema rejects them)
  - type: web
    name: eims-web
    runtime: static
    buildCommand: npm install --include=dev && npm run build -w frontend
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        value: https://eims-api.onrender.com/api/v1
