<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta name="description" content="Enterprise Inventory Management System — POS, Pharmacy, Hospital, Accounting" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts load on demand from Settings; default is the device system font -->
    <title>Enterprise IMS</title>
    <!--
      Critical: apply the device default typeface before any CSS/JS modules.
      Android WebView: only generic "sans-serif" → Typeface.DEFAULT (OEM/user font).
      Naming "Roboto" / "Inter" / system-ui first freezes a WebView face and ignores
      the phone Settings → Display → Font style choice.
    -->
    <style id="eims-critical-font">
      html, body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      html[data-platform="android"],
      html[data-platform="android"] body {
        font-family: sans-serif !important;
      }
      html[data-platform="ios"],
      html[data-platform="ios"] body {
        font-family: -apple-system, system-ui, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif !important;
      }
    </style>
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var ua = navigator.userAgent || '';
          var isAndroid = /Android/i.test(ua);
          var isIOS = /iPhone|iPad|iPod/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
          if (isAndroid) root.setAttribute('data-platform', 'android');
          else if (isIOS) root.setAttribute('data-platform', 'ios');

          // Defaults: device system font + device light/dark theme
          var fontId = 'system';
          var themeMode = 'system';
          try {
            var raw = localStorage.getItem('eims-theme');
            if (raw) {
              var parsed = JSON.parse(raw);
              var savedFont = parsed && parsed.state && parsed.state.fontId;
              if (savedFont && typeof savedFont === 'string' && savedFont !== 'system') fontId = savedFont;
              var savedTheme = parsed && parsed.state && parsed.state.theme;
              if (savedTheme === 'light' || savedTheme === 'dark' || savedTheme === 'system') {
                themeMode = savedTheme;
              }
            }
          } catch (e) { /* keep system defaults */ }

          // Color theme: system → prefers-color-scheme; else explicit light/dark
          var prefersDark = false;
          try {
            prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          } catch (e2) { /* ignore */ }
          var resolvedDark = themeMode === 'dark' || (themeMode === 'system' && prefersDark);
          if (resolvedDark) root.classList.add('dark');
          else root.classList.remove('dark');
          root.setAttribute('data-theme', themeMode);
          root.setAttribute('data-resolved-theme', resolvedDark ? 'dark' : 'light');
          try {
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', resolvedDark ? '#0f172a' : '#f8fafc');
          } catch (e3) { /* ignore */ }

          if (fontId === 'system') {
            root.classList.add('font-system');
            root.classList.remove('font-custom');
            var stack = isAndroid
              ? 'sans-serif'
              : isIOS
                ? '-apple-system, system-ui, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif'
                : 'system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif';
            root.style.setProperty('--font-sans', stack);
            root.style.setProperty('--font-display', stack);
            root.style.fontFamily = stack;
            if (document.body) document.body.style.fontFamily = stack;
            root.setAttribute('data-font', 'system');
          } else {
            root.classList.add('font-custom');
            root.classList.remove('font-system');
            root.setAttribute('data-font', fontId);
          }
        } catch (e) { /* non-fatal */ }
      })();
    </script>
  </head>
  <body class="h-full antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
